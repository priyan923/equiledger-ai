<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>EquiLedgerAI | Secure Login</title>
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <main class="auth-shell">
    <section class="brand-lockup" aria-label="EquiLedgerAI">
      <div class="brand-mark" aria-hidden="true">
        <svg viewBox="0 0 24 24" width="22" height="22">
          <path d="M4 6.5A2.5 2.5 0 0 1 6.5 4h11A2.5 2.5 0 0 1 20 6.5v11a2.5 2.5 0 0 1-2.5 2.5h-11A2.5 2.5 0 0 1 4 17.5z" fill="none" stroke="currentColor" stroke-width="1.8"/>
          <path d="M8 9h7.5a2 2 0 0 1 0 4H13a2 2 0 0 0 0 4h5" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
        </svg>
      </div>
      <h1>EquiLedgerAI</h1>
      <p>Secure login · Amazon Cognito</p>
    </section>

    <section class="login-card" aria-labelledby="login-title">
      <header class="login-card__header">
        <span aria-hidden="true">◇</span>
        <h2 id="login-title">OAuth2 · Federated Identity · Session Tokens</h2>
      </header>

      <div id="oauthContainer" class="oauth-container">
        <button id="googleLogin" class="google-button" type="button">
          <span class="google-g">G</span>
          <span>Continue with Google</span>
        </button>
        <div class="divider"><span>or</span></div>
      </div>

      <form id="loginForm" class="login-form" novalidate>
        <label class="field" for="email">
          <span>Email Address</span>
          <span class="input-wrap">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 6h16v12H4z" fill="none" stroke="currentColor" stroke-width="1.6"/><path d="m4 7 8 6 8-6" fill="none" stroke="currentColor" stroke-width="1.6"/></svg>
            <input id="email" name="email" type="email" autocomplete="email" placeholder="you@company.com">
          </span>
          <small id="emailError" class="error-text"></small>
        </label>

        <label class="field" for="password">
          <span>Password</span>
          <span class="input-wrap">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M7 10V8a5 5 0 0 1 10 0v2" fill="none" stroke="currentColor" stroke-width="1.6"/><path d="M6 10h12v10H6z" fill="none" stroke="currentColor" stroke-width="1.6"/></svg>
            <input id="password" name="password" type="password" autocomplete="current-password" placeholder="••••••••••">
            <button id="togglePassword" class="ghost-icon" type="button" aria-label="Show password">
              <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M2.5 12s3.5-5 9.5-5 9.5 5 9.5 5-3.5 5-9.5 5-9.5-5-9.5-5z" fill="none" stroke="currentColor" stroke-width="1.5"/><circle cx="12" cy="12" r="2.5" fill="none" stroke="currentColor" stroke-width="1.5"/></svg>
            </button>
          </span>
          <small id="passwordError" class="error-text"></small>
        </label>

        <button id="loginSubmit" class="primary-button" type="submit">Sign In</button>

        <div class="form-links">
          <a
          href="javascript:void(0);"
          id="forgotPasswordLink"
          class="forgot-password-link"
          aria-label="Recover password" >

          Forgot Password?
          </a>
          <a href="#" id="showRegister" aria-label="Register account">Register Account →</a>
        </div>

        <p id="authStatus" class="auth-status" role="status"></p>
      </form>

      <form id="registerForm" class="login-form" novalidate hidden>
        <label class="field" for="registerName">
          <span>Full Name</span>
          <span class="input-wrap">
            <svg viewBox="0 0 24 24" aria-hidden="true"><circle cx="12" cy="8" r="3.4" fill="none" stroke="currentColor" stroke-width="1.6"/><path d="M5 20c1.4-4 4-6 7-6s5.6 2 7 6" fill="none" stroke="currentColor" stroke-width="1.6"/></svg>
            <input id="registerName" name="name" type="text" autocomplete="name" placeholder="Aman Verma">
          </span>
        </label>

        <label class="field" for="registerEmail">
          <span>Email Address</span>
          <span class="input-wrap">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 6h16v12H4z" fill="none" stroke="currentColor" stroke-width="1.6"/><path d="m4 7 8 6 8-6" fill="none" stroke="currentColor" stroke-width="1.6"/></svg>
            <input id="registerEmail" name="email" type="email" autocomplete="email" placeholder="you@company.com">
          </span>
          <small id="registerEmailError" class="error-text"></small>
        </label>

        <label class="field" for="registerPassword">
          <span>Password</span>
          <span class="input-wrap">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M7 10V8a5 5 0 0 1 10 0v2" fill="none" stroke="currentColor" stroke-width="1.6"/><path d="M6 10h12v10H6z" fill="none" stroke="currentColor" stroke-width="1.6"/></svg>
            <input id="registerPassword" name="password" type="password" autocomplete="new-password" placeholder="At least 8 characters">
            <button id="registerTogglePassword" class="ghost-icon" type="button" aria-label="Show password">
              <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M2.5 12s3.5-5 9.5-5 9.5 5 9.5 5-3.5 5-9.5 5-9.5-5-9.5-5z" fill="none" stroke="currentColor" stroke-width="1.5"/><circle cx="12" cy="12" r="2.5" fill="none" stroke="currentColor" stroke-width="1.5"/></svg>
            </button>
          </span>
          <small id="registerPasswordError" class="error-text"></small>
        </label>

        <button id="registerSubmit" class="primary-button" type="submit">Create Account</button>

        <div class="form-links">
          <a href="#" id="showLogin" aria-label="Back to sign in">← Back to Sign In</a>
        </div>

        <p id="registerStatus" class="auth-status" role="status"></p>
      </form>

      <form id="confirmForm" class="login-form" novalidate hidden>
        <label class="field" for="confirmCode">
          <span>Verification Code</span>
          <span class="input-wrap">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 6h16v12H4z" fill="none" stroke="currentColor" stroke-width="1.6"/><path d="m4 7 8 6 8-6" fill="none" stroke="currentColor" stroke-width="1.6"/></svg>
            <input id="confirmCode" name="code" type="text" inputmode="numeric" placeholder="123456">
          </span>
          <small id="confirmCodeError" class="error-text"></small>
        </label>

        <button id="confirmSubmit" class="primary-button" type="submit">Verify & Continue</button>

        <div class="form-links">
          <a href="#" id="resendCode" aria-label="Resend verification code">Resend Code</a>
          <a href="#" id="showLoginFromConfirm" aria-label="Back to sign in">← Back to Sign In</a>
        </div>

        <p id="confirmStatus" class="auth-status" role="status"></p>
      </form>
    </section>

    <footer class="auth-footer">Protected by TLS 1.3 · Encrypted session tokens · SOC2</footer>
  </main>
  <script src="./config.js"></script>
  <script src="./auth.js?v=2" defer></script>
</body>
</html>
